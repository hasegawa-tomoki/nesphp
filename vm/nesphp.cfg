# nesphp MMC1 (mapper 1, SNROM) linker config
# PRG-ROM 32KB + CHR-ROM 32KB + PRG-RAM 8KB (WRAM $6000-$7FFF)
# spec/01-rom-format.md / spec/02-ram-layout.md / spec/11-chr-banks.md を参照

MEMORY {
    # iNES ヘッダ (ROM 先頭 16 バイト)
    HEADER:  start = $00,    size = $10,    type = ro, file = %O, fill = yes;

    # PRG-ROM 32KB ($8000-$FFFF)
    # MMC1 mode 3: $C000-$FFFF = 最終バンク固定 (VM 本体), $8000-$BFFF = 切替可能 (ops.bin)
    PRG:     start = $8000,  size = $8000,  type = ro, file = %O, fill = yes, fillval = $00;

    # CHR-ROM 32KB (MMC1 4KB mode: 8 × 4KB bank)
    CHR:     start = $0000,  size = $8000,  type = ro, file = %O, fill = yes;

    # WRAM
    ZP:      start = $00,    size = $100,   type = rw, define = yes;
    RAM:     start = $0200,  size = $600,   type = rw, define = yes;
}

SEGMENTS {
    HEADER:   load = HEADER, type = ro;
    PHPSRC:   load = PRG,    type = ro, start = $8000;   # pack_src.php が出した src.bin (u16 len + ASCII)
    CODE:     load = PRG,    type = ro, start = $C000;   # VM 本体 + on-NES コンパイラ
    VECTORS:  load = PRG,    type = ro, start = $FFFA;   # NMI/RESET/IRQ
    CHARS:    load = CHR,    type = ro;                   # font.chr
    ZEROPAGE: load = ZP,     type = zp;
    BSS:      load = RAM,    type = bss, define = yes;
}
