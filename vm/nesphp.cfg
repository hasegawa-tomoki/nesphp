# nesphp MMC1 (mapper 1) linker config
# PRG-ROM 64KB (4 × 16KB bank) + CHR-RAM 8KB + PRG-RAM 8KB
# spec/01-rom-format.md / spec/02-ram-layout.md / spec/11-chr-banks.md を参照
#
# bank 0 ($8000-$BFFF when selected): PHPSRC (PHP ソース)
# bank 1 ($8000-$BFFF when selected): CHRDATA (CHR タイル data、起動時に PPU $0000-$1FFF へ転送)
# bank 2 ($8000-$BFFF when selected): 予約
# bank 3 ($C000-$FFFF, 固定):         CODE (VM 本体) + VECTORS
#
# CHR-RAM 8KB は iNES ヘッダで CHR-ROM=0 を申告 → emulator/cart 側で確保される。
# CHR-RAM 自体は ROM ファイルには含まれない (chr/font.chr は PRG_BANK1 経由で焼く)。

MEMORY {
    # iNES ヘッダ (ROM 先頭 16 バイト)
    HEADER:  start = $00,    size = $10,    type = ro, file = %O, fill = yes;

    # PRG-ROM 64KB = 4 × 16KB banks。ld65 はこの順で出力ファイルに連結する。
    PRG_BANK0: start = $8000, size = $4000, type = ro, file = %O, fill = yes, fillval = $FF;
    PRG_BANK1: start = $8000, size = $4000, type = ro, file = %O, fill = yes, fillval = $FF;
    PRG_BANK2: start = $8000, size = $4000, type = ro, file = %O, fill = yes, fillval = $FF;
    PRG_BANK3: start = $C000, size = $4000, type = ro, file = %O, fill = yes, fillval = $FF;

    # WRAM
    ZP:      start = $00,    size = $100,   type = rw, define = yes;
    RAM:     start = $0200,  size = $600,   type = rw, define = yes;
}

SEGMENTS {
    HEADER:   load = HEADER,    type = ro;
    PHPSRC:   load = PRG_BANK0, type = ro, start = $8000;   # pack_src.php が出した src.bin (u16 len + ASCII)
    CHRDATA:  load = PRG_BANK1, type = ro, start = $8000;   # font.chr (起動時に PPU CHR-RAM へ転送)
    CODE:     load = PRG_BANK3, type = ro, start = $C000;   # VM 本体 + on-NES コンパイラ
    VECTORS:  load = PRG_BANK3, type = ro, start = $FFFA;   # NMI/RESET/IRQ
    ZEROPAGE: load = ZP,        type = zp;
    BSS:      load = RAM,       type = bss, define = yes;
}
