# nesphp MMC1 (mapper 1, SNROM) linker config
# PRG-ROM 32KB + CHR-ROM 32KB + PRG-RAM 8KB (WRAM $6000-$7FFF)
# spec/01-rom-format.md / spec/02-ram-layout.md / spec/11-chr-banks.md を参照

MEMORY {
    # iNES ヘッダ (ROM 先頭 16 バイト)
    HEADER:  start = $00,    size = $10,    type = ro, file = %O, fill = yes;

    # PRG-ROM bank 0 ($8000-$BFFF, 16KB) — MMC1 mode 3 の切替バンク側
    # PHPSRC + BANK0_BOOT(trampoline ミラー) + BANK0_VECTORS が乗る
    PRG0:    start = $8000,  size = $4000,  type = ro, file = %O, fill = yes, fillval = $00;

    # PRG-ROM bank 1 ($C000-$FFFF, 16KB) — MMC1 mode 3 の固定バンク側 (VM 本体)
    PRG1:    start = $C000,  size = $4000,  type = ro, file = %O, fill = yes, fillval = $00;

    # CHR-ROM 32KB (MMC1 4KB mode: 8 × 4KB bank)
    CHR:     start = $0000,  size = $8000,  type = ro, file = %O, fill = yes;

    # WRAM
    ZP:      start = $00,    size = $100,   type = rw, define = yes;
    RAM:     start = $0200,  size = $600,   type = rw, define = yes;
}

SEGMENTS {
    HEADER:        load = HEADER, type = ro;

    # --- PRG bank 0 ---
    PHPSRC:        load = PRG0,   type = ro, start = $8000;   # pack_src.php が出した src.bin (u16 len + ASCII)
    # bank 0 末尾 16B: BANK1_BOOT + VECTORS の byte-for-byte ミラー。
    # EverDrive N8 等で MMC1 が mode 3 以外で起動した際、bank 0 が $C000-$FFFF
    # にマップされても CPU が trampoline に到達できるようにする (vm/nesphp.s の
    # コメント参照)。
    BANK0_BOOT:    load = PRG0,   type = ro, start = $BFF0;
    BANK0_VECTORS: load = PRG0,   type = ro, start = $BFFA;

    # --- PRG bank 1 ---
    CODE:          load = PRG1,   type = ro, start = $C000;   # VM 本体 + on-NES コンパイラ
    BANK1_BOOT:    load = PRG1,   type = ro, start = $FFF0;   # MMC1 reset trampoline
    VECTORS:       load = PRG1,   type = ro, start = $FFFA;   # NMI/RESET/IRQ

    CHARS:         load = CHR,    type = ro;                   # font.chr
    ZEROPAGE:      load = ZP,     type = zp;
    BSS:           load = RAM,    type = bss, define = yes;
}
